<!DOCTYPE html>
<html lang="{{ page.lang }}">
<head>
    <meta charset="UTF-8">
    <title>
        {% if page.url == "/" %}
        {{ site.title }} | {{ site.description }}
        {% else %}
        {{ page.title }} | {{ site.title }}
        {% endif %}
    </title>
    <meta name="description" content="{{ page.description }}">
    <link rel="stylesheet" href="{{ '/css/normalize.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}">
</head>

<body>

    {% include header.html %}

    <main>
    {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
